<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit posts</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">

</head>
<body>

    <h1>Edit Posts</h1>
    <div class="form-container">
    <form method="POST" action="{{url_for('edit_post',post_id=post.id)}}" enctype="multipart/form-data">
        <label for="title">Title:</label>
        <input type="text" id="title" name="title" value="{{post.title}}" required />
        <br>
        <br>

        <label for="content">Content :</label>
        <textarea name="content" id="content" required>{{post.content}}</textarea>
        <br>
        <br>

        <label for="image">Upload Image :</label>
        <input type="file" id="image" name="image" accept="image/*">
        <br><br>

        <!-- existing image preview -->
         {% if post.image %}
         <img src="{{url_for('static', filename='uploads/' + post.image.replace('\\','/').split('/')[-1])}}" alt="post image" width="200">
         {% endif %}
         <br><br>


         <button type="submit" class="btn">Update Post </button>
    </form>
    <a href="{{url_for('home')}}">Back to home page</a>
    </div>
    
</body>
</html>
